apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubepulse
  namespace: production
  labels:
    app: kubepulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubepulse
  template:
    metadata:
      labels:
        app: kubepulse
    spec:
      serviceAccountName: kubepulse-sa

      containers:
      - name: kubepulse
        image: /skjaberbhy/kubepulse-lite:${TAG}
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8000

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
